name: Update flake inputs

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 15 * * *" # midnight JST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.list-hosts.outputs.hosts }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: cachix/cachix-action@v17
        with:
          name: brandonpollack23
          extraPullNames: nix-community,watersucks
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Update flake inputs
        run: nix flake update

      - name: Check flake
        run: nix flake check --print-build-logs

      - name: Discover hosts
        id: list-hosts
        run: |
          hosts=$(ls hosts/ | jq -Rsc '[split("\n") | .[] | select(length > 0)]')
          echo "hosts=$hosts" >> "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          if git diff --staged --quiet; then
            echo "Flake inputs are already up to date"
          else
            changes=$(python3 <<'PYEOF'
import json, subprocess

old_raw = subprocess.run(['git', 'show', 'HEAD:flake.lock'],
                         capture_output=True, text=True)
old = json.loads(old_raw.stdout) if old_raw.returncode == 0 else {'nodes': {}}

with open('flake.lock') as f:
    new = json.load(f)

lines = []
for name in sorted(set(old['nodes']) | set(new['nodes'])):
    old_rev = ((old['nodes'].get(name) or {}).get('locked') or {}).get('rev', '')
    new_rev = ((new['nodes'].get(name) or {}).get('locked') or {}).get('rev', '')
    if old_rev == new_rev:
        continue
    if old_rev and new_rev:
        lines.append(f'  {name}: {old_rev[:7]}..{new_rev[:7]}')
    elif new_rev:
        lines.append(f'  {name}: added at {new_rev[:7]}')
    elif old_rev:
        lines.append(f'  {name}: removed (was {old_rev[:7]})')
print('\n'.join(lines))
PYEOF
            )
            if [ -n "$changes" ]; then
              git commit -m "$(printf 'chore: update flake inputs\n\n%s' "$changes")"
            else
              git commit -m "chore: update flake inputs"
            fi
            git push
          fi

  build:
    needs: update
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host: ${{ fromJson(needs.update.outputs.hosts) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: cachix/cachix-action@v17
        with:
          name: brandonpollack23
          extraPullNames: nix-community,watersucks
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build ${{ matrix.host }}
        run: |
          result=$(nix build ".#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel" --no-link --print-out-paths --print-build-logs)
          cachix push brandonpollack23 "$result"
          cachix pin brandonpollack23 "${{ matrix.host }}-latest" "$result" --keep-revisions 1
